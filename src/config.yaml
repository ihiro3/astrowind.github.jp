# サイト全体の基本情報
site:
  name: '山下○○ 公式サイト' # ご自身のお名前に書き換えてください
  origin: 'https://astrowind-github-jp.vercel.app' # ご自身のドメイン
  basePathname: '/'
  trailingSlash: false

  title: '山下○○ | 〇〇市議会議員 公式サイト'
  description: '地域と共に歩む。山下○○の活動報告、政策、プロフィールをお届けします。'

# ブログ（活動履歴）の設定
blog:
  disabled: false
  postsPerPage: 6
  isRelatedPostsEnabled: true
  relatedPostsCount: 4
  post:
    disabled: false
    renderFullContent: false
  list:
    disabled: false
  category:
    disabled: false
  tag:
    disabled: false

# 画像の設定（ここが重要です！）
image:
  service: 'astro' # Astro 6標準の画像処理を使用

# お問い合わせやSNSの設定
header:
  links:
    - text: 'トップ'
      href: '/'
    - text: '活動報告'
      href: '/blog'
    - text: 'プロフィール'
      href: '/about'
    - text: 'お問い合わせ'
      href: '/contact'

footer:
  secondaryLinks:
    - text: 'プライバシーポリシー'
      href: '/privacy'
  socialLinks:
    - ariaLabel: 'X'
      icon: 'tabler:brand-x'
      href: '#' # ご自身のX（旧Twitter）のURL
    - ariaLabel: 'Facebook'
      icon: 'tabler:brand-facebook'
      href: '#' # ご自身のFacebookのURL
